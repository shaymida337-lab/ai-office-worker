services:
  - type: cron
    name: ai-office-worker-db-backup
    runtime: node
    plan: starter
    region: oregon
    schedule: "0 3 * * *"
    buildCommand: "npm install"
    startCommand: "npm exec -w backend -- tsx scripts/backup-to-r2.ts"
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: DIRECT_URL
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        value: ai-office-worker-backups

  - type: web
    name: ai-office-worker-backend
    runtime: node
    plan: free
    region: oregon
    autoDeploy: true
    buildCommand: "npm install --include=dev && npm run db:generate -w backend && npm run build -w backend"
    preDeployCommand: 'export DIRECT_URL="${DIRECT_URL:-${DATABASE_URL//-pooler/}}" && cd backend && DATABASE_URL="$DIRECT_URL" PRISMA_MIGRATE_ADVISORY_LOCK_TIMEOUT=60000 npx prisma migrate deploy'
    startCommand: "npm run start -w backend"
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      # Natalie Calendar Engine flags intentionally omitted — remain disabled until cutover.
      # Do NOT set CALENDAR_ENGINE_V1_READ/WRITE in production before UI + migration plan.
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://ai-office-worker-frontend.onrender.com
      - key: GOOGLE_CLIENT_ID
        value: 962636575245-k60is1q1in957n61in4dhlkvbtpga59l.apps.googleusercontent.com
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: https://ai-office-worker-backend.onrender.com/api/auth/google/callback
      - key: GOOGLE_INTEGRATION_REDIRECT_URI
        value: https://ai-office-worker-backend.onrender.com/api/integrations/gmail/callback
      - key: GOOGLE_CLIENT_REDIRECT_URI
        value: https://ai-office-worker-backend.onrender.com/api/clients/gmail/callback
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-haiku-4-5-20251001
      - key: AI_VOICE_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_TTS_MODEL
        value: gpt-4o-mini-tts
      - key: OPENAI_TTS_VOICE
        value: nova
      - key: CRON_SECRET
        generateValue: true
      - key: DEBUG_CLASSIFICATION_TOKEN
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_NUMBER
        value: whatsapp:+14155238886
      - key: OWNER_WHATSAPP
        sync: false
      - key: TWILIO_WEBHOOK_URL
        value: https://ai-office-worker-backend.onrender.com/webhook/whatsapp
      - key: WHATSAPP_MESSAGE_PROCESSING_ENABLED
        value: "true"
      - key: WHATSAPP_MEDIA_INGESTION_ENABLED
        value: "true"
      - key: WHATSAPP_AUTO_REPLY_ENABLED
        value: "false"
      - key: WHATSAPP_CREATE_CLIENTS_ENABLED
        value: "false"
      - key: WHATSAPP_WEB_ENABLED
        value: "false"
      - key: GOOGLE_DRIVE_ROOT
        value: AI Office Worker

  - type: web
    name: ai-office-worker-frontend
    runtime: node
    plan: free
    region: oregon
    autoDeploy: true
    buildCommand: "export NEXT_PUBLIC_APP_COMMIT=$RENDER_GIT_COMMIT && npm install --include=dev && npm run build -w frontend"
    startCommand: cd frontend && npx next start -p $PORT
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://ai-office-worker-backend.onrender.com
