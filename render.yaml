services:
  - type: web
    name: ai-office-worker-backend
    runtime: node
    plan: free
    region: oregon
    autoDeploy: true
    buildCommand: "export DIRECT_URL=${DIRECT_URL:-$DATABASE_URL} && cd backend && npm install && npm run db:generate && npm run build"
    startCommand: "export DIRECT_URL=${DIRECT_URL:-$DATABASE_URL} && cd backend && npm run db:migrate:deploy && node dist/index.js"
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://ai-office-worker-frontend.onrender.com
      - key: GOOGLE_CLIENT_ID
        value: 962636575245-k60is1q1in957n61in4dhlkvbtpga59l.apps.googleusercontent.com
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: https://ai-office-worker-backend.onrender.com/api/auth/google/callback
      - key: GOOGLE_INTEGRATION_REDIRECT_URI
        value: https://ai-office-worker-backend.onrender.com/api/integrations/gmail/callback
      - key: GOOGLE_CLIENT_REDIRECT_URI
        value: https://ai-office-worker-backend.onrender.com/api/clients/gmail/callback
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-haiku-4-5-20251001
      - key: AI_VOICE_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_TTS_MODEL
        value: gpt-4o-mini-tts
      - key: OPENAI_TTS_VOICE
        value: nova
      - key: CRON_SECRET
        generateValue: true
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_NUMBER
        value: whatsapp:+14155238886
      - key: OWNER_WHATSAPP
        sync: false
      - key: TWILIO_WEBHOOK_URL
        value: https://ai-office-worker-backend.onrender.com/webhook/whatsapp
      - key: WHATSAPP_MESSAGE_PROCESSING_ENABLED
        value: "false"
      - key: GOOGLE_DRIVE_ROOT
        value: AI Office Worker

  - type: web
    name: ai-office-worker-frontend
    runtime: node
    plan: free
    region: oregon
    autoDeploy: true
    buildCommand: npm install --include=dev && npm run build -w frontend
    startCommand: cd frontend && npx next start -p $PORT
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://ai-office-worker-backend.onrender.com
