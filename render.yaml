services:
  - type: web
    name: ai-office-worker-backend
    runtime: node
    plan: free
    region: oregon
    autoDeploy: true
    buildCommand: "cd backend && npm install && npm run build"
    startCommand: "cd backend && npm start"
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: GOOGLE_INTEGRATION_REDIRECT_URI
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-haiku-4-5-20251001
      - key: CRON_SECRET
        generateValue: true
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_NUMBER
        value: whatsapp:+14155238886
      - key: OWNER_WHATSAPP
        sync: false
      - key: TWILIO_WEBHOOK_URL
        value: https://ai-office-worker-backend.onrender.com/webhook/whatsapp
      - key: GOOGLE_DRIVE_ROOT
        value: AI Office Worker

  - type: web
    name: ai-office-worker-frontend
    runtime: node
    plan: free
    region: oregon
    autoDeploy: true
    buildCommand: npm install --include=dev && npm run build -w frontend
    startCommand: cd frontend && npx next start -p $PORT
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://ai-office-worker-backend.onrender.com
