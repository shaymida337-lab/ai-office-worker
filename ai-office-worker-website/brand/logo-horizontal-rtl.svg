<svg xmlns="http://www.w3.org/2000/svg" width="520" height="140" viewBox="0 0 520 140" direction="rtl" role="img" aria-label="עובד משרד AI">
  <defs>
    <linearGradient id="lk-tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3a6cff"/>
      <stop offset="0.55" stop-color="#1d5bff"/>
      <stop offset="1" stop-color="#143cbf"/>
    </linearGradient>
    <linearGradient id="lk-bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
  </defs>

  <!-- mark on the RIGHT (start of RTL reading) -->
  <g transform="translate(404,18)">
    <rect width="104" height="104" rx="26" fill="url(#lk-tile)"/>
    <path d="M28 80 L52 34 L76 80" fill="none" stroke="#ffffff" stroke-width="11"
          stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M34 65 H70" stroke="url(#lk-bar)" stroke-width="10" stroke-linecap="round"/>
    <path d="M76 27 l2.6 7 7 2.6 -7 2.6 -2.6 7 -2.6 -7 -7 -2.6 7 -2.6 z" fill="#34d399"/>
  </g>

  <!-- Hebrew wordmark (uses Assistant if available, sensible fallbacks otherwise) -->
  <text x="376" y="64" text-anchor="end"
        font-family="'Assistant','Plus Jakarta Sans','Segoe UI',Arial,sans-serif"
        font-size="44" font-weight="800" fill="#0b2a6b" direction="rtl">עובד משרד <tspan fill="#1d5bff">AI</tspan></text>
  <text x="376" y="98" text-anchor="end"
        font-family="'Assistant','Plus Jakarta Sans','Segoe UI',Arial,sans-serif"
        font-size="18" font-weight="600" letter-spacing="0.5" fill="#5b6b8c" direction="rtl">העובד שאף פעם לא מתעייף</text>
</svg>
