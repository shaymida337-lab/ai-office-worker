<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-label="עובד משרד AI logo mark">
  <defs>
    <linearGradient id="aow-tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3a6cff"/>
      <stop offset="0.55" stop-color="#1d5bff"/>
      <stop offset="1" stop-color="#143cbf"/>
    </linearGradient>
    <linearGradient id="aow-bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
    <filter id="aow-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0b2a6b" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- tile -->
  <rect x="8" y="8" width="240" height="240" rx="56" fill="url(#aow-tile)" filter="url(#aow-soft)"/>
  <!-- subtle top sheen -->
  <rect x="8" y="8" width="240" height="240" rx="56" fill="#ffffff" opacity="0.06"/>

  <!-- ascending A / chevron -->
  <path d="M68 190 L128 76 L188 190" fill="none" stroke="#ffffff" stroke-width="26"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- green crossbar = work handled -->
  <path d="M82 154 H174" stroke="url(#aow-bar)" stroke-width="24" stroke-linecap="round"/>
  <!-- AI spark -->
  <path d="M186 64 l6 16 16 6 -16 6 -6 16 -6 -16 -16 -6 16 -6 z" fill="#34d399"/>
</svg>
