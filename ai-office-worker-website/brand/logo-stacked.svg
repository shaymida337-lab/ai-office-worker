        font-size="40" font-weight="800" fill="#0b2a6b" direction="rtl">עובד משרד <tspan fill="#1d5bff">AI</tspan></text>
  <text x="180" y="204" text-anchor="middle"
        font-family="'Assistant','Plus Jakarta Sans','Segoe UI',Arial,sans-serif"
        font-size="16" font-weight="600" letter-spacing="0.5" fill="#5b6b8c" direction="rtl">העובד שאף פעם לא מתעייף</text>
