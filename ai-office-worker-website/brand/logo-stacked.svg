<svg xmlns="http://www.w3.org/2000/svg" width="360" height="240" viewBox="0 0 360 240" role="img" aria-label="עובד משרד AI">
  <defs>
    <linearGradient id="st-tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3a6cff"/>
      <stop offset="0.55" stop-color="#1d5bff"/>
      <stop offset="1" stop-color="#143cbf"/>
    </linearGradient>
    <linearGradient id="st-bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#34d399"/>
