    <path d="M34 65 H70" stroke="url(#st-bar)" stroke-width="10" stroke-linecap="round"/>
    <path d="M76 27 l2.6 7 7 2.6 -7 2.6 -2.6 7 -2.6 -7 -7 -2.6 7 -2.6 z" fill="#34d399"/>
